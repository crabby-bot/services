<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦀 OpenCrabby — Demo Request</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --deep: #070b1a;
            --glow-cyan: #00d2ff;
            --glow-green: #2ecc71;
            --glow-red: #e63946;
            --glow-orange: #ff9f43;
            --foam: #e8f4f8;
            --muted: rgba(232,244,248,0.45);
        }

        html, body {
            background: var(--deep);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--foam);
            line-height: 1.6;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .page {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,.06);
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--glow-cyan);
            letter-spacing: 2px;
        }

        .demo-request-form {
            background: rgba(255,255,255,.025);
            border: 1px solid rgba(0,210,255,.3);
            border-radius: 18px;
            padding: 1.5rem;
            margin-top: 2rem;
            width: 100%;
        }

        .demo-request-form input {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            background: rgba(255,255,255,.025);
            border: 1px solid rgba(0,210,255,.3);
            border-radius: 8px;
            color: var(--foam);
            font-family: 'Space Mono', monospace;
            transition: all .25s;
        }

        .demo-request-form input:focus {
            outline: none;
            border-color: var(--glow-cyan);
            box-shadow: 0 0 10px rgba(0,210,255,.2);
        }

        .gdpr-consent {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .gdpr-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1px solid rgba(0,210,255,.3);
            border-radius: 4px;
            margin-right: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .gdpr-checkbox:checked {
            background: rgba(0,210,255,.2);
            border-color: var(--glow-cyan);
        }

        .gdpr-checkbox:checked::after {
            content: '✓';
            color: var(--glow-cyan);
            font-size: 0.9rem;
        }

        .demo-request-btn {
            width: 100%;
            padding: 0.7rem;
            background: linear-gradient(135deg, rgba(0,210,255,.15), rgba(0,210,255,.1));
            border: 1px solid rgba(0,210,255,.4);
            color: var(--glow-cyan);
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            transition: all .25s;
            cursor: pointer;
        }

        .demo-request-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .demo-request-status {
            margin-top: 1rem;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            min-height: 1.2rem;
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding: 1rem 0;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
        }

        @media (max-width: 400px) {
            .page {
                padding: 0.5rem;
            }

            .demo-request-form {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="logo-text">opencrabby.com</div>
        </div>

        <div class="demo-request-form">
            <input type="email" id="demoRequestEmail" placeholder="your@email.com" required>
            <div class="gdpr-consent">
                <input type="checkbox" id="gdprConsent" class="gdpr-checkbox">
                <label for="gdprConsent">I acknowledge data processing</label>
            </div>
            <button class="demo-request-btn" onclick="requestDemo()" disabled>REQUEST DEMO</button>
            <div id="demoRequestStatus" class="demo-request-status"></div>
        </div>

        <div class="footer">🦀 opencrabby.com · demo request system</div>
    </div>

    <script>
        const gdprCheckbox = document.getElementById('gdprConsent');
        const demoBtn = document.querySelector('.demo-request-btn');
        const emailInput = document.getElementById('demoRequestEmail');
        const statusEl = document.getElementById('demoRequestStatus');

        gdprCheckbox.addEventListener('change', validateForm);
        emailInput.addEventListener('input', validateForm);

        function validateForm() {
            const email = emailInput.value.trim();
            const isValidEmail = email && email.includes('@');
            demoBtn.disabled = !(isValidEmail && gdprCheckbox.checked);
        }

        function requestDemo() {
            const email = emailInput.value.trim();

            // Basic email validation
            if (!email || !email.includes('@')) {
                statusEl.style.color = 'var(--glow-red)';
                statusEl.textContent = '// invalid email address 🦀';
                return;
            }

            // Ensure consent is checked
            if (!gdprCheckbox.checked) {
                statusEl.style.color = 'var(--glow-red)';
                statusEl.textContent = '// please acknowledge data processing 🦀';
                return;
            }

            // Disable button during request
            demoBtn.disabled = true;
            demoBtn.textContent = 'SENDING...';
            statusEl.textContent = '';

            // Send demo request
            fetch('/demo/request', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    email: email,
                    gdprConsent: true 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    statusEl.style.color = 'var(--glow-green)';
                    statusEl.textContent = '// demo request sent! we\'ll ping you 🦀';
                    emailInput.value = '';
                    gdprCheckbox.checked = false;
                    demoBtn.disabled = true;
                    demoBtn.textContent = 'REQUEST DEMO';
                } else {
                    throw new Error(data.message || 'Request failed');
                }
            })
            .catch(error => {
                statusEl.style.color = 'var(--glow-red)';
                statusEl.textContent = `// ${error.message} 🦀`;
                demoBtn.disabled = false;
                demoBtn.textContent = 'REQUEST DEMO';
            });
        }
    </script>
</body>
</html>
